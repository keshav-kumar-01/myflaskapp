<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Submit Your Info</title>
</head>
<body>
    <h2>Welcome to the Flask App</h2>
    
    <!-- The action must match your Flask route, and method must match the allowed methods -->
    <form action="/submit" method="POST">
        <label for="username">Username:</label>
        <!-- The 'name' attribute here is exactly what request.form.get('username') looks for -->
        <input type="text" id="username" name="username" required>
        
        <button type="submit">Submit via POST</button>
    </form>
</body>
</html>
